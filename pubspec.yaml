name: fts
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: '>=3.41.0 <4.0.0'

dependencies:
  animated_text_kit: ^4.3.0
  app_design_system:
    path: 'packages/app_design_system'
  app_settings: ^7.0.0
  bloc_dispose_scope: ^3.0.0
  bloc_presentation: ^1.1.2
  cached_network_image: ^3.4.1
  cached_query: ^3.5.1
  calendar_date_picker2: ^2.0.0
  clock: ^1.1.1
  collection: ^1.18.0
  copy_with_extension: ^12.0.0
  cqrs: ^10.1.0
  duration: ^4.0.3
  email_validator: ^3.0.0
  enhanced_gradients: ^2.0.0
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_gen: ^5.14.0
  flutter_hooks: ^0.21.3
  flutter_local_notifications: ^21.0.0
  flutter_localizations:
    sdk: flutter
  flutter_native_splash: ^2.4.7
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.0.10+1
  flutter_web_auth_2: ^5.0.2
  geocoding: ^4.0.0
  go_router: ^17.2.2
  google_maps_flutter: ^2.17.0
  google_sign_in: ^7.2.0
  http: ^1.6.0
  image_picker: ^1.2.1
  intl: ^0.20.2
  json_annotation: ^4.8.1
  jwt_decoder: ^2.0.1
  leancode_app_rating: ^0.0.2
  leancode_contracts: ^0.8.0
  leancode_cubit_utils: ^0.5.0
  leancode_cubit_utils_cqrs: ^0.5.0
  leancode_debug_page: ^3.1.0
  leancode_force_update: ^1.0.0-alpha+3
  leancode_forms: ^0.1.1
  leancode_hooks: ^0.1.1
  leancode_kratos_client: ^0.8.0
  leancode_pipe: ^2.0.0
  locale_names: ^1.1.1
  location: ^8.0.0
  logging: ^1.2.0
  package_info_plus: ^8.3.1
  passkeys: ^2.17.4
  provider: ^6.1.5
  quick_actions: ^1.1.0
  rxdart: ^0.28.0
  shared_preferences: ^2.2.2
  sign_in_with_apple: ^7.0.1
  sliver_tools: ^0.2.12
  timeago: ^3.7.1
  timeago_flutter: ^3.6.0
  url_launcher: ^6.3.0
  uuid: ^4.5.1

  vector_graphics: any
dev_dependencies:
  app_lint:
    path: packages/app_lint
  bloc_test: ^10.0.0
  build_runner: ^2.11.1
  copy_with_extension_gen: ^12.0.0
  darttools:
    git:
      url: git@github.com:leancodepl/leanai.git
      ref: af2e0887e195df7dbb740a8e7da850d92ba8cd08
      path: tools/mobile/packages/darttools
  flutter_gen_runner: ^5.4.0
  flutter_launcher_icons: ^0.14.3
  flutter_test:
    sdk: flutter
  go_router_builder: ^4.3.0
  integration_test:
    sdk: flutter
  json_serializable: ^6.7.1
  leancode_contracts_generator: ^0.17.1
  leancode_lint: ^22.0.0
  meta: ^1.18.0
  mocktail: ^1.0.4
  patrol: ^4.6.1
  patrol_mcp: ^0.1.4

dependency_overrides:
  mcp_dart: 2.1.0
  # Flutter 3.41 pins `meta` to `1.17.0`, but the analyzer plugins require `1.18.0`
  meta: ^1.18.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/
    - assets/social/
    - assets/icons/
    - assets/icons/standard/
    - assets/flags/
    - assets/images/

flutter_gen:
  output: lib/resources/
  line_length: 80

  integrations:
    flutter_svg: true

flutter_icons:
  # TODO: Replace with real app icon
  image_path: 'assets/branding/app_icon.png'
  android: 'launcher_icon'
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21
  web:
    generate: true
    image_path: 'assets/branding/fav_icon.png'

flutter_native_splash:
  color: '#000000'
  android: true
  ios: true
  web: true

  android_12:
    color: '#000000'
    icon_background_color: '#000000'
    image: assets/splash_background.png

patrol:
  app_name: FlutterTechSummit
  flavor: tst
  android:
    package_name: pl.leancode.fts.tst
  ios:
    bundle_id: pl.leancode.fts
